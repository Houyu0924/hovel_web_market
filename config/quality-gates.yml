required:
  - 検索意図が一文で定義されている
  - 想定読者と利用場面が明確
  - 商品選定基準が先に定義されている
  - 主要スペックに確認元がある
  - 実機未検証である場合は明示されている
  - メリットだけでなく不向きな人も記載
  - 内部リンク候補がある
  - CTAが本文の結論と整合
  - 広告・アフィリエイト表記がある
reject:
  - 根拠のないランキング
  - 使っていない商品の使用感
  - 最安・必ず・完全など検証不能な断定
  - 出典のない健康効果
  - 商品ページの言い換えだけの記事
  - 検索意図が同じ既存記事の重複制作
