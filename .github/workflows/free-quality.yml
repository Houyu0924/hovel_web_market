name: HOVEL Free Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Workflow validation
        run: python scripts/validate_sprint2.py
      - name: Article quality gate
        run: python scripts/quality_gate.py --repo-root .
